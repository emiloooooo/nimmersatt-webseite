<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimmersatt</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="shortcut icon" href="assets/logo.svg">
  <link rel="apple-touch-icon" href="assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rock+3D&family=Martian+Mono:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=33">
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>

  <!-- Preloader: the loader.mp4 frame sequence was converted to a GIF so
       every browser / autoplay policy simply plays it on paint. The
       overlay is still skippable on click (see js/main.js
       skipPreloader()), and auto-dismisses once frames are ready plus
       a LOADER_DURATION minimum. -->
  <div class="preloader" id="preloader">
    <img class="preloader__media" src="assets/loader.gif?v=2" alt="Nimmersatt">
  </div>

  <!-- Logo: oben rechts (toggle Menu) -->
  <button class="logo-btn" id="logo-btn" aria-label="Menü öffnen" aria-expanded="false">
    <img class="logo" src="assets/logo.svg" alt="Nimmersatt">
  </button>

  <!-- Dropdown Menu: populated dynamically from PROJECTS in js/main.js.
       The viewport wrapper is the fixed-height window that clips the list.
       The <ul> inside translates vertically via transform (driven by wheel
       / touch delta while the menu is open) — see main.js menuScroll*. -->
  <nav class="menu" id="menu" aria-hidden="true">
    <div class="menu__viewport" id="menu-viewport">
      <ul class="menu__list" id="menu-list"></ul>
    </div>
  </nav>

  <!-- Fading layer: previous project in its 1.65 → 2.0 phase -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Text for fading project (sits under white overlay) -->
  <div id="text-bg" class="text-anchor" aria-hidden="true">
    <h1 class="text-title"></h1>
    <p class="text-body"></p>
  </div>

  <!-- Weißes Overlay: zwischen fading und emerging -->
  <div id="white-overlay" aria-hidden="true"></div>

  <!-- Emerging / current layer: primary project in its 0 → 1.65 phase -->
  <canvas id="fg-canvas" aria-hidden="true"></canvas>

  <!-- Text for current project (sits above white overlay) -->
  <div id="text-fg" class="text-anchor" aria-live="polite">
    <h1 class="text-title"></h1>
    <p class="text-body"></p>
  </div>

  <!-- Mobile project-step nav — shown only on narrow viewports. Each
       click advances the scroll scene by one full project cycle so the
       user never has to finger-drag through the hard stops. Hidden
       when the menu or player modal is open. -->
  <div class="project-nav is-hidden" id="project-nav" aria-label="Projektnavigation">
    <button class="project-nav__btn" type="button" data-project-nav="prev" aria-label="Vorheriges Projekt">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 5L8 12l7 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="project-nav__btn" type="button" data-project-nav="next" aria-label="Nächstes Projekt">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- Player Modal -->
  <div id="player-modal" class="player-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="player-title">
    <div class="player-modal__backdrop" data-close></div>
    <article class="player-modal__card">
      <button class="player-modal__close" type="button" aria-label="Schließen" data-close>×</button>
      <div class="player-modal__stage">
        <!-- Video shown when a project.video path is present; otherwise
             hidden and the fallback below takes its place. -->
        <video class="player-modal__video" controls playsinline preload="metadata"></video>
        <!-- Custom fullscreen toggle. Native video controls also offer
             one, but iOS Safari routes fullscreen through a separate
             webkitEnterFullscreen API that isn't hooked up when
             playsinline is set. This button uses the correct call path
             for every browser. -->
        <button class="player-modal__fs" type="button" aria-label="Vollbild" data-fs>
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" width="18" height="18">
            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="player-modal__stage-fallback">
          <span class="player-modal__stage-label">Coming soon</span>
          <h2 class="player-modal__stage-title"></h2>
        </div>
        <!-- Multi-video navigation — hidden unless the active project has
             more than one clip. Arrows flank the stage; a mono counter
             anchors the set so the extra content is discoverable. -->
        <button class="player-modal__nav player-modal__nav--prev" type="button" aria-label="Vorheriges Video" data-nav="prev" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 5L8 12l7 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="player-modal__nav player-modal__nav--next" type="button" aria-label="Nächstes Video" data-nav="next" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="player-modal__counter" aria-live="polite" hidden>
          <span class="player-modal__counter-index">1</span>
          <span class="player-modal__counter-sep">/</span>
          <span class="player-modal__counter-total">1</span>
        </div>
      </div>
      <aside class="player-modal__info">
        <h2 id="player-title" class="player-modal__title"></h2>
        <div class="player-modal__description"></div>
        <dl class="player-modal__credits"></dl>
      </aside>
    </article>
  </div>

  <script src="js/main.js?v=54"></script>
  <script src="js/chime.js?v=9"></script>
</body>
</html>
